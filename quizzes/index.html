<!DOCTYPE html>
<html lang="pl" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizy — Xav</title>
  <link rel="stylesheet" href="../assets/css/base.css" />
  <style>
    .quiz-row {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px;
      background: var(--ink-1);
      border: 1px solid var(--ink-3);
      border-radius: var(--radius);
      text-decoration: none; color: inherit;
      transition: border-color var(--t), background var(--t), transform var(--t);
      margin-bottom: 8px;
    }
    .quiz-row:hover {
      border-color: var(--ink-4);
      background: var(--ink-2);
      transform: translateX(3px);
    }
    .qr-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--blue-dim);
      border: 1px solid var(--blue-line);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .qr-body { flex: 1; min-width: 0; }
    .qr-name { font-size: 14.5px; font-weight: 500; color: var(--white); margin-bottom: 4px; }
    .qr-meta { display: flex; gap: 8px; }
    .qr-arrow { color: var(--mist-6); font-size: 18px; transition: all var(--t); flex-shrink: 0; }
    .quiz-row:hover .qr-arrow { color: var(--white); transform: translateX(3px); }

    .add-hint {
      margin-top: 28px; padding: 16px 20px;
      border: 1px solid var(--ink-3); border-radius: var(--radius);
      font-family: var(--mono); font-size: 12px; color: var(--mist-6);
      line-height: 1.7;
    }
    .add-hint strong { color: var(--mist-5); font-weight: 500; }
    .add-hint code {
      background: var(--ink-2); padding: 1px 6px;
      border-radius: 4px; color: var(--blue); font-size: 11px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="../index.html"><span class="dot"></span>Xav</a>
    <div class="nav-links" id="navLinks">
      <a class="nav-link" href="../index.html">Start</a>
      <a class="nav-link active" href="index.html">Quizy</a>
      <a class="nav-link" href="../files/index.html">Pliki</a>
      <a class="nav-link" href="../notes/index.html">Notatki</a>
    </div>
    <div class="nav-end">
      <button class="icon-btn" id="themeBtn">◐</button>
      <button class="ham-btn" id="hamBtn">☰</button>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-top a-in">
      <div class="crumb"><a href="../index.html">Xav</a><span>/</span>Quizy</div>
      <h1>Quizy</h1>
      <p>Wybierz semestr i przedmiot.</p>
    </div>

    <div class="a-in d1">
      <div class="tabs" id="tabBar"></div>
      <div id="panels"></div>
    </div>
  </div>

  <footer class="site-footer" style="margin-top: 60px;"><span>Xav – Quizy</span><a href="../index.html">↵ Start</a></footer>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/shared.js"></script>
  <script>
  const { semesters, quizzes } = window.SH;
  const tabBar = document.getElementById('tabBar');
  const panels = document.getElementById('panels');
  const diff = { 'łatwy': 'badge-green', 'średni': 'badge-amber', 'trudny': 'badge-red' };

  semesters.forEach((s, i) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (i===0?' active':'');
    tab.textContent = s.label;
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('p-'+s.id).classList.add('active');
    };
    tabBar.appendChild(tab);

    const panel = document.createElement('div');
    panel.id = 'p-'+s.id;
    panel.className = 'tab-panel'+(i===0?' active':'');

    const list = quizzes[s.id] || [];
    if (!list.length) {
      panel.innerHTML = `<div class="empty"><div class="e-icon">🚧</div><h3>Brak quizów</h3><p>Quizy dla ${s.label} pojawią się tutaj po dodaniu.</p></div>`;
    } else {
      list.forEach(q => {
        const a = document.createElement('a');
        a.className = 'quiz-row';
        a.href = q.file;
        a.innerHTML = `
          <div class="qr-icon">📝</div>
          <div class="qr-body">
            <div class="qr-name">${q.name}</div>
            <div class="qr-meta">
              <span class="badge ${diff[q.difficulty]||'badge-muted'}">${q.difficulty||'quiz'}</span>
              <span class="badge badge-muted">${q.questions||'?'} pytań</span>
              ${q.subject ? `<span class="badge badge-muted">${q.subject}</span>` : ''}
            </div>
          </div>
          <span class="qr-arrow">›</span>`;
        panel.appendChild(a);
      });
    }
    panels.appendChild(panel);
  });
  </script>
</body>
</html>
