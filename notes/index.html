<!DOCTYPE html>
<html lang="pl" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notatki — Xav</title>
  <link rel="stylesheet" href="../assets/css/base.css" />
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
      gap: 12px;
    }
    .note-card {
      background: var(--ink-1); border: 1px solid var(--ink-3);
      border-radius: var(--radius-lg); padding: 22px 20px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color var(--t), transform var(--t), box-shadow var(--t);
    }
    .note-card:hover {
      border-color: var(--ink-4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    .nc-icon { font-size: 26px; line-height: 1; }
    .nc-name { font-size: 14.5px; font-weight: 500; color: var(--white); letter-spacing: -.01em; }
    .nc-desc { font-size: 12.5px; color: var(--mist-6); line-height: 1.5; flex: 1; }
    .nc-arr  { font-size: 16px; color: var(--mist-6); align-self: flex-end; transition: all var(--t); }
    .note-card:hover .nc-arr { color: var(--white); transform: translateX(3px); }

    .add-hint {
      margin-top: 32px; padding: 16px 20px;
      border: 1px solid var(--ink-3); border-radius: var(--radius);
      font-family: var(--mono); font-size: 12px; color: var(--mist-6); line-height: 1.8;
    }
    .add-hint strong { color: var(--mist-5); font-weight: 500; }
    .add-hint code { background: var(--ink-2); padding: 1px 6px; border-radius: 4px; color: var(--blue); font-size: 11px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="../index.html"><span class="dot"></span>Xav</a>
    <div class="nav-links" id="navLinks">
      <a class="nav-link" href="../index.html">Start</a>
      <a class="nav-link" href="../quizzes/index.html">Quizy</a>
      <a class="nav-link" href="../files/index.html">Pliki</a>
      <a class="nav-link active" href="index.html">Notatki</a>
    </div>
    <div class="nav-end">
      <button class="icon-btn" id="themeBtn">◐</button>
      <button class="ham-btn" id="hamBtn">☰</button>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-top a-in">
      <div class="crumb"><a href="../index.html">Xav</a><span>/</span>Notatki</div>
      <h1>Notatki</h1>
      <p>Wybierz zestaw notatek do przeglądania.</p>
    </div>

    <div class="a-in d1">
      <div class="s-label">Dostępne zestawy</div>
      <div class="notes-grid" id="notesGrid"></div>

    </div>
  </div>


  <footer class="site-footer" style="margin-top: 60px;"><span>Xav – Notatki</span><a href="../index.html">↵ Start</a></footer>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/shared.js"></script>
  <script>
  (function(){
    const notes = (window.SH || {}).notes || [];
    const grid  = document.getElementById('notesGrid');

    if (!notes.length) {
      grid.innerHTML = `<p style="color:var(--mist-6);font-size:13px">Brak notatek. Dodaj je zgodnie z instrukcją poniżej.</p>`;
      return;
    }

    notes.forEach(n => {
      const a = document.createElement('a');
      a.className = 'note-card a-in';
      a.href = `viewer.html?id=${encodeURIComponent(n.id)}`;
      a.innerHTML = `
        <div class="nc-icon">${n.emoji || '📝'}</div>
        <div class="nc-name">${n.name}</div>
        <div class="nc-desc">${n.desc || ''}</div>
        <div class="nc-arr">→</div>`;
      grid.appendChild(a);
    });
  })();
  </script>
</body>
</html>
